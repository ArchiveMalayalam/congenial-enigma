services:
  jekyll:
    build:
      context: ./jekyll
      dockerfile: ../.devcontainer/Dockerfile
    ports:
      - "4000:4000"
    restart: unless-stopped
    environment:
      - JEKYLL_ENV=production
    volumes:
      - .:/workspace
    command: sleep infinity
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  open-webui:
      image: ghcr.io/open-webui/open-webui:main
      ports:
        - "3000:8080"
      environment:
        - OLLAMA_BASE_URL=http://ollama:11434
      volumes:
        - open-webui_data:/app/backend/data
      depends_on:
        - ollama
      restart: unless-stopped
volumes:
  ollama_data:
  open-webui_data: